<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Tive</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; scroll-behavior: smooth; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 95%; max-width: 1000px; }
        h2 { margin-top: 0; color: #1a73e8; font-size: 24px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; margin-bottom: 25px; }

        .config-row { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 15px; flex-wrap: wrap; }
        .col-depto { flex: 1; min-width: 250px; } 
        .col-pregunta { flex: 3; min-width: 450px; }

        .label-title { font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #5f6368; display: block; }

        .search-box { 
            width: 100%; padding: 14px 16px; border-radius: 8px; border: 2px solid #1a73e8; 
            font-size: 15px; box-sizing: border-box; background: #fff;
        }

        .opciones-placa { 
            background: #f8f9fa; padding: 12px 15px; border-radius: 8px; 
            border: 1px solid #dadce0;
        }
        .radio-group { display: flex; gap: 15px; justify-content: space-around; }
        .radio-item { 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; 
            cursor: pointer; font-size: 13px; background: white; padding: 10px 5px; 
            border-radius: 6px; border: 1px solid #dee2e6; font-weight: 500;
        }

        .textarea-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0px; margin-top: 20px; }
        .header-buttons-left { display: flex; gap: 5px; }

        .btn-small { 
            border: none; border-radius: 6px 6px 0 0; padding: 7px 15px; 
            font-size: 12px; cursor: pointer; font-weight: bold; color: white; 
            transition: opacity 0.2s; text-decoration: none; display: inline-flex; align-items: center;
        }

        .btn-copy { background: #6f42c1; } 
        .btn-follow { background: #007bff; } 
        .btn-ia { background: #e91e63; } 
        .btn-clear-mini { background: #f2994a; } 

        textarea { 
            width: 100%; height: 260px; padding: 15px; border: 1px solid #dadce0; 
            border-radius: 8px 0 8px 8px; box-sizing: border-box; font-family: 'Consolas', monospace; 
            font-size: 14px; margin-bottom: 20px; resize: vertical; display: block; line-height: 1.6;
        }

        .buttons { display: flex; gap: 15px; }
        button.main-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .btn-preview { background: #1a73e8; color: white; }
        .btn-preview:disabled { background: #bdc1c6; cursor: not-allowed; }
        .btn-download { background: #34a853; color: white; }
        
        .preview-area { margin-top: 30px; text-align: center; border-top: 2px solid #f1f3f4; padding-top: 25px; }
        .preview-area img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #btnTop {
            display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99; 
            border: none; outline: none; background-color: #1a73e8; color: white; 
            cursor: pointer; padding: 15px; border-radius: 50%; font-size: 20px;
            width: 50px; height: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<button onclick="topFunction()" id="btnTop" title="Ir arriba">▲</button>

<div class="container">
    <h2>📝 Panel de Generación TIVE</h2>

    <form method="POST" id="mainForm">
        <div class="config-row">
            <div class="col-depto">
                <label class="label-title">📍 Sede Registral:</label>
                <input list="deptos" id="depto_input" class="search-box" placeholder="Sede..." value="{{ depto_previo }}" autocomplete="off">
                <datalist id="deptos">
                    <option value="ABANCAY"> <option value="ANDAHUAYLAS"> <option value="AREQUIPA">
                    <option value="AYACUCHO"> <option value="BAGUA"> <option value="BARRANCA">
                    <option value="CAJAMARCA"> <option value="CALLAO"> <option value="CAMANA">
                    <option value="CASMA"> <option value="CASTILLA _ APLAO"> <option value="CAÑETE">
                    <option value="CHACHAPOYAS"> <option value="CHEPEN"> <option value="CHICLAYO">
                    <option value="CHIMBOTE"> <option value="CHINCHA"> <option value="CHOTA">
                    <option value="CUSCO"> <option value="ESPINAR"> <option value="HUACHO">
                    <option value="HUAMACHUCO"> <option value="HUANCAVELICA"> <option value="HUANCAYO">
                    <option value="HUANTA"> <option value="HUANUCO"> <option value="HUARAL">
                    <option value="HUARAZ"> <option value="ICA"> <option value="ILO">
                    <option value="ISLAY _ MOLLENDO"> <option value="JAEN"> <option value="JUANJUI">
                    <option value="JULIACA"> <option value="LA MERCED (SELVA CENTRAL)"> <option value="LIMA">
                    <option value="MADRE DE DIOS"> <option value="MAYNAS"> <option value="MOQUEGUA">
                    <option value="MOYOBAMBA"> <option value="NAZCA"> <option value="OTUZCO">
                    <option value="PASCO"> <option value="PISCO"> <option value="PIURA">
                    <option value="PUCALLPA"> <option value="PUNO"> <option value="QUILLABAMBA">
                    <option value="SAN PEDRO"> <option value="SATIPO"> <option value="SICUANI">
                    <option value="SULLANA"> <option value="TACNA"> <option value="TARAPOTO">
                    <option value="TARMA"> <option value="TINGO MARIA"> <option value="TRUJILLO">
                    <option value="TUMBES"> <option value="YURIMAGUAS">
                </datalist>
            </div>

            <div class="col-pregunta">
                <label class="label-title">❓ ¿En qué lado está el guion de la placa?</label>
                <div class="opciones-placa">
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="pos_guion" value="izq" id="g_izq" {% if pos_guion == 'izq' %}checked{% endif %}> Izquierdo</label>
                        <label class="radio-item"><input type="radio" name="pos_guion" value="cen" id="g_cen" {% if pos_guion == 'cen' or not pos_guion %}checked{% endif %}> Central</label>
                        <label class="radio-item"><input type="radio" name="pos_guion" value="der" id="g_der" {% if pos_guion == 'der' %}checked{% endif %}> Derecho</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="textarea-header">
            <div class="header-buttons-left">
                <a href="https://copialiteral-altoque.sunarp.gob.pe/" target="_blank" class="btn-small btn-copy">📄 Copia Literal</a>
                <a href="https://siguelo.sunarp.gob.pe/siguelo/titulo" target="_blank" class="btn-small btn-follow">🔗 Síguelo</a>
                <a href="https://www.kimi.com/chat/19d69311-24c2-87ea-8000-090b9ecebbf2" target="_blank" class="btn-small btn-ia">🤖 IA</a>
            </div>
            <button type="button" class="btn-small btn-clear-mini" onclick="limpiarFormulario()">🧹 Limpiar Todo</button>
        </div>
        <textarea name="texto_datos" id="texto_datos" placeholder="Pegue la información aquí...">{{ texto }}</textarea>

        <input type="hidden" name="depto_nombre" id="depto_nombre" value="{{ depto_previo }}">
        
        <div class="buttons">
            <button type="button" id="btn_preview" onclick="actualizarDatosYEnviar('preview')" class="main-btn btn-preview" disabled>🔍 Generar Vista Previa</button>
            <button type="button" onclick="actualizarDatosYEnviar('download')" class="main-btn btn-download">📥 Descargar PDF</button>
        </div>
    </form>

    {% if imagen_preview %}
    <div class="preview-area" id="preview_section">
        <h3>🖼️ Vista Previa Generada:</h3>
        <img src="data:image/jpeg;base64,{{ imagen_preview }}" alt="Preview">
    </div>
    {% endif %}
</div>

    "ISLAY _ MOLLENDO": { zona: "ZONA REGISTRAL Nº XII", sede: "SEDE REGISTRAL - ISLAY _ MOLLENDO", foto: "mollendo" },

    "TACNA": { zona: "ZONA REGISTRAL Nº XII", sede: "SEDE REGISTRAL - TACNA", foto: "tacna" },
    "PUNO": { zona: "ZONA REGISTRAL Nº XIII", sede: "SEDE REGISTRAL - PUNO", foto: "puno" },
    "JULIACA": { zona: "ZONA REGISTRAL Nº XIII", sede: "SEDE REGISTRAL - JULIACA", foto: "juliaca" }
};

const textarea = document.getElementById('texto_datos');
const inputDepto = document.getElementById('depto_input');
const hiddenDepto = document.getElementById('depto_nombre');
const btnPreview = document.getElementById('btn_preview');

// --- LÓGICA DE DETECCIÓN INTELIGENTE ---
textarea.addEventListener('input', function() {
    const contenido = this.value;
    const coincidencia = contenido.match(/sede_partida:\s*([^\n\r]+)/i);
    
    if (coincidencia && coincidencia[1]) {
        const sedeDetectada = coincidencia[1].trim().toUpperCase();
        
        // SOLO ejecutar si la sede detectada es diferente a la actual
        if (datosDeptos[sedeDetectada] && hiddenDepto.value !== sedeDetectada) {
            inputDepto.value = sedeDetectada;
            hiddenDepto.value = sedeDetectada;
            btnPreview.disabled = false;

            let lineasRestantes = contenido.split('\n').filter(l => 
                !l.toLowerCase().startsWith('zona_registral:') && 
                !l.toLowerCase().startsWith('sede:') && 
                !l.toLowerCase().startsWith('foto:')
            );

            let cabecera = [
                `zona_registral: ${datosDeptos[sedeDetectada].zona}`,
                `sede: ${datosDeptos[sedeDetectada].sede}`,
                `foto: ${datosDeptos[sedeDetectada].foto}`,
                "" 
            ];
            
            this.value = cabecera.join('\n') + lineasRestantes.join('\n').trim();
        }
    }
});

function limpiarFormulario() {
    textarea.value = ""; inputDepto.value = ""; hiddenDepto.value = "";
    btnPreview.disabled = true; document.getElementById('g_cen').checked = true;
    const preview = document.getElementById('preview_section'); if (preview) preview.style.display = 'none';
}

function topFunction() { window.scrollTo({top: 0, behavior: 'smooth'}); }
window.onscroll = function() { 
    let btn = document.getElementById("btnTop");
    if (document.documentElement.scrollTop > 300) btn.style.display = "block"; else btn.style.display = "none";
};

function generarAleatorio(prefijo, totalDigitos) {
    let r = prefijo;
    for (let i = 0; i < (totalDigitos - prefijo.length); i++) r += Math.floor(Math.random() * 10);
    return r;
}

function procesarGuionPlaca(texto) {
    const pos = document.querySelector('input[name="pos_guion"]:checked').value;
    let lineas = texto.split('\n');
    for (let i = 0; i < lineas.length; i++) {
        if (lineas[i].toLowerCase().startsWith('placa:')) {
            let valorPlaca = lineas[i].split(':')[1].trim().replace(/-/g, ''); 
            let placaConGuion = valorPlaca;
            if (pos === 'izq' && valorPlaca.length >= 2) placaConGuion = valorPlaca.substring(0, 2) + '-' + valorPlaca.substring(2);
            else if (pos === 'cen' && valorPlaca.length >= 3) placaConGuion = valorPlaca.substring(0, 3) + '-' + valorPlaca.substring(3);
            else if (pos === 'der' && valorPlaca.length >= 4) placaConGuion = valorPlaca.substring(0, 4) + '-' + valorPlaca.substring(4);
            lineas[i] = `placa: ${placaConGuion}`;
            break;
        }
    }
    return lineas.join('\n');
}

function actualizarDatosYEnviar(action) {
    let contenido = textarea.value;
    contenido = procesarGuionPlaca(contenido);
    if (!contenido.toLowerCase().includes("fecha:")) { 
        const ahora = new Date();
        const f = `${String(ahora.getDate()).padStart(2, '0')}/${String(ahora.getMonth() + 1).padStart(2, '0')}/${ahora.getFullYear()} ${String(ahora.getHours()).padStart(2, '0')}:${String(ahora.getMinutes()).padStart(2, '0')}:${String(ahora.getSeconds()).padStart(2, '0')}`;
        contenido += `\nfecha: ${f}`; 
    }
    if (!contenido.toLowerCase().includes("numero_tarjeta:")) { contenido += `\nnumero_tarjeta: ${generarAleatorio("10", 10)}`; }
    if (!contenido.toLowerCase().includes("verificacion:")) { contenido += `\nverificacion: ${generarAleatorio("", 8)}`; }
    
    textarea.value = contenido.trim();
    const form = document.getElementById('mainForm');
    form.action = (action === 'download') ? '/descargar' : '/';
    form.submit();
}

window.onload = function() { if (inputDepto.value && datosDeptos[inputDepto.value.toUpperCase()]) btnPreview.disabled = false; };
</script>
</body>
</html>
